<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BC2 Player Watch</title>
  <meta name="description" content="Is a Battlefield: Bad Company 2 player online? Watch a player on a BC2 server via the bflist.io API.">
  <link rel="stylesheet" href="style.v1.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='6' fill='%232ecc71'/></svg>">
</head>
<body>
  <main class="card" id="card">
    <header class="head">
      <span class="dot" id="dot" data-status="grey" aria-hidden="true"></span>
      <div class="head-text">
        <h1 class="title" id="title">BC2 Player Watch</h1>
        <p class="sub" id="sub">Loading…</p>
      </div>
      <button class="icon-btn" id="refresh" title="Refresh now" aria-label="Refresh now">⟳</button>
      <button class="icon-btn" id="gear" title="Settings" aria-label="Settings">⚙</button>
    </header>

    <section class="roster" id="roster" hidden>
      <p class="map"><span class="map-label">Map:</span> <span id="map-name">—</span></p>
      <div class="teams">
        <div class="team" id="team1">
          <h2 class="team-head" id="team1-head">Team 1</h2>
          <ul class="players"></ul>
        </div>
        <div class="team" id="team2">
          <h2 class="team-head" id="team2-head">Team 2</h2>
          <ul class="players"></ul>
        </div>
      </div>
    </section>

    <form class="config" id="config" hidden>
      <label>Player name(s) — comma-separated to watch more than one
        <input type="text" id="cfg-player" autocomplete="off" spellcheck="false" placeholder="e.g. alice, bob">
      </label>
      <div class="row actions">
        <button type="submit" class="primary">Save</button>
        <button type="button" id="cfg-cancel" class="ghost">Cancel</button>
      </div>
      <p class="hint">Saved in this page's URL — bookmark or share the link to watch the same player(s).</p>
    </form>

    <footer class="foot">
      <span id="updated">—</span>
      <a href="https://bflist.io" target="_blank" rel="noopener">data: bflist.io</a>
    </footer>
  </main>

  <script src="app.v1.js"></script>
</body>
</html>
